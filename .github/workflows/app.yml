###############################################################################
# Application Pipeline — Build & Deploy to Cloud Run
#
# Triggers:
#   • Push to main  → build both services, deploy to Cloud Run
#   • Pull request  → build + scan only (no deploy)
#
# ── GitHub Secrets (Settings → Secrets and variables → Actions → Secrets) ───
#
#   GCP_SA_KEY        — Service account JSON key (same SA used by infra pipeline).
#                       Must have roles: run.admin, artifactregistry.writer,
#                       iam.serviceAccountUser, storage.objectViewer.
#                       Paste the full contents of the key.json file.
#
#   GCP_PROJECT_ID    — GCP project ID  (e.g. my-devops-project-123)
#
#   GCP_REGION        — GCP region where Cloud Run services are deployed
#                       (e.g. europe-west1)
#
#   AR_REPOSITORY     — Artifact Registry repository ID.
#                       Get it from Terraform output: artifact_registry_url
#                       (e.g. devops-copilot-prod)
#
#   BACKEND_URL       — Full HTTPS URL of the Cloud Run backend service.
#                       Get it from Terraform output: backend_url
#                       (e.g. https://devops-copilot-backend-xxxx-ew.a.run.app)
#
# ── GitHub Variables (Settings → Secrets and variables → Actions → Variables) ─
#
#   (none required — all config is passed via secrets above)
###############################################################################

name: "Application — Build & Deploy"

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app.yml"

permissions:
  contents: read
  packages: write
  security-events: write  # For SARIF upload

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  REGISTRY: "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.AR_REPOSITORY }}"

jobs:
  # ─── Backend Build & Scan ───────────────────────────────────────────────────
  backend:
    name: "Backend — Build, Scan & Push"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/backend:latest
            ${{ env.REGISTRY }}/backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/backend:buildcache,mode=max
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/backend:${{ github.sha }}"
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-backend.sarif"
          category: "trivy-backend"

  # ─── Frontend Build & Scan ──────────────────────────────────────────────────
  frontend:
    name: "Frontend — Build, Scan & Push"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The backend URL is injected as a build-arg so Next.js bakes it in.
      # In production the value comes from Cloud Run URL (known post-terraform).
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/frontend:latest
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_URL }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/frontend:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/frontend:${{ github.sha }}"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "trivy-frontend"

  # ─── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to Cloud Run"
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy-frontend.outputs.url }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        run: |
          gcloud run services update devops-copilot-backend \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.REGISTRY }}/backend:${{ github.sha }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)"

      - name: Deploy Frontend to Cloud Run
        id: deploy-frontend
        run: |
          URL=$(gcloud run services update devops-copilot-frontend \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Smoke test — Backend health check
        run: |
          BACKEND_URL=$(gcloud run services describe devops-copilot-backend \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health")
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "::notice title=Deployment Complete::Frontend: ${{ steps.deploy-frontend.outputs.url }}"

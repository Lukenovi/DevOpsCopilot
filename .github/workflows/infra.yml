###############################################################################
# Infrastructure Pipeline — Terraform on Google Cloud
#
# Triggers:
#   • Push to main   → terraform plan + apply (auto-approve)
#   • Pull request   → terraform plan only (posted as PR comment)
#   • Manual trigger → choose plan or apply
#
# ── GitHub Secrets (Settings → Secrets and variables → Actions → Secrets) ───
#
#   GCP_SA_KEY        — Service account JSON key (base64-encoded or raw JSON).
#                       Generate with:
#                         gcloud iam service-accounts keys create key.json \
#                           --iam-account=terraform-sa@PROJECT_ID.iam.gserviceaccount.com
#                       Then paste the full contents of key.json as the secret value.
#
#   GCP_PROJECT_ID    — GCP project ID  (e.g. my-devops-project-123)
#
#   TF_STATE_BUCKET   — GCS bucket name that holds Terraform remote state
#                       (e.g. my-devops-project-123-tf-state)
#
# ── GitHub Variables (Settings → Secrets and variables → Actions → Variables) ─
#
#   TF_VERSION        — (optional) Override the Terraform version to use.
#                       Defaults to the value hardcoded in env.TF_VERSION below.
###############################################################################

name: "Infrastructure — Terraform"

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/infra.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read
  pull-requests: write   # Required to post plan output as PR comment

env:
  TF_VERSION: "1.7.5"
  TF_WORKING_DIR: "./terraform"
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  # ─── Terraform Plan ─────────────────────────────────────────────────────────
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -input=false \
            -no-color

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 7

      # Post plan output as a PR comment
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const output = `#### Terraform Format 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Init ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validate 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if Plan Failed
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1

  # ─── Terraform Apply ─────────────────────────────────────────────────────────
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: plan
    environment: production
    # Only apply on push to main or an explicit workflow_dispatch apply
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -input=false \
            -no-color

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -input=false -no-color tfplan

      - name: Output Infrastructure URLs
        run: terraform output -no-color

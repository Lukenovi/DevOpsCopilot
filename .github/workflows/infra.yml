###############################################################################
# Infrastructure Pipeline — Terraform on Google Cloud
#
# Triggers:
#   • Manual only (workflow_dispatch) — choose plan, apply, or destroy
#
# ── GitHub Secrets (Settings → Secrets and variables → Actions → Secrets) ───
#
#   GCP_SA_KEY        — Service account JSON key (base64-encoded or raw JSON).
#                       Generate with:
#                         gcloud iam service-accounts keys create key.json \
#                           --iam-account=terraform-sa@PROJECT_ID.iam.gserviceaccount.com
#                       Then paste the full contents of key.json as the secret value.
#
# ── GitHub Variables (Settings → Secrets and variables → Actions → Variables) ─
#
#   GCP_PROJECT_ID    — GCP project ID  (e.g. my-devops-project-123)
#
#   TF_STATE_BUCKET   — GCS bucket name that holds Terraform remote state
#                       (e.g. my-devops-project-123-tf-state)
#
#   TF_VERSION        — (optional) Override the Terraform version to use.
#                       Defaults to the value hardcoded in env.TF_VERSION below.
###############################################################################

name: "Infrastructure — Terraform"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read

env:
  TF_VERSION: "1.7.5"
  TF_WORKING_DIR: "./terraform"
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}

jobs:
  # ─── Terraform Plan ──────────────────────────────────────────────────────────
  # Run this first to review changes. Output is visible in the Actions log.
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'plan'
    environment: production

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -input=false \
            -no-color

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -no-color

  # ─── Terraform Apply ──────────────────────────────────────────────────────────
  # Self-contained — re-runs plan internally then applies. No dependency on the
  # plan job above, so it can be triggered in a separate workflow run.
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'apply'
    environment: production

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -input=false \
            -no-color

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -no-color tfplan

      - name: Output Infrastructure URLs
        run: terraform output -no-color

  # ─── Terraform Destroy ────────────────────────────────────────────────────────
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment: production

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -input=false \
            -no-color

      - name: Terraform Destroy
        run: terraform destroy -input=false -no-color -auto-approve
